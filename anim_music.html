<!DOCTYPE html>
<html>
<head>
    <title>Equalizer Animation</title>
   <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    height:100vh;
    position:relative;
}

.loader{
    width:120px;
    height:80px;
    position:absolute;
    top:50%;
    left:50%;
}

.loader > *{
    width:16px;
    background:white;
    position:absolute;
    bottom:0;
    animation:equalizer 1s infinite ease-in-out;
}

.loader > .bar1{
    left:0;
    animation-delay:0s;
}

.loader > .bar2{
    left:24px;
    animation-delay:0.2s;
}

.loader > .bar3{
    left:48px;
    animation-delay:0.4s;
}

.loader >.bar4{
    left:72px;
    animation-delay:0.6s;
}

@keyframes equalizer{

    0%{
        height:20px;
    }

    25%{
        height:65px;
    }

    50%{
        height:35px;
    }

    75%{
        height:70px;
    }

    100%{
        height:20px;
    }
}
   </style>
</head>
<body>

<div class="loader">
    <div class="bar1"></div>
    <div class="bar2"></div>
    <div class="bar3"></div>
    <div class="bar4"></div>
</div>

</body>
</html>
